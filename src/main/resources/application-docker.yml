spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:veloservice_db}?sslmode=disable
    username: ${DB_USERNAME:velo_user}
    password: ${DB_PASSWORD:velo_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:veloservice_db}?sslmode=disable
    user: ${DB_USERNAME:velo_user}
    password: ${DB_PASSWORD:velo_pass}
    schemas: public
    baseline-on-migrate: true
    baseline-version: 2
    locations: classpath:db/migration
    validate-on-migrate: false
server:
  port: 8080
  servlet:
    context-path: /api/v1
jwt:
  secret: ${JWT_SECRET:dev-docker-secret-not-for-production-use-min32chars!!}
  expiration: 86400000
security:
  login:
    max-attempts: 5
    window-minutes: 10
    lock-minutes: 15
  reset-expiration: 900000
app:
  reset-password-url: ${RESET_PASSWORD_URL:http://localhost:3000/reset-password}
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:}
  base-url: https://api.resend.com
logging:
  level:
    org.springframework.security: DEBUG
    com.veloservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
