spring:
  datasource:
    url: jdbc:h2:mem:veloservice;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: dev-secret-not-for-production-use-min32chars!!

# Forzar enums como VARCHAR en H2 (no afecta producción)
spring:
  jpa:
    properties:
      hibernate:
        hbm2ddl:
          import_files_sql_extractor: org.hibernate.tool.hbm2ddl.MultipleLinesSqlCommandExtractor
