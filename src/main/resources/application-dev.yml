spring:
  datasource:
    url: jdbc:h2:mem:veloservice;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
