spring:
  application:
    name: bikeshop-manager
  datasource:
    url: jdbc:postgresql://localhost:5432/bikeshop_db
    username: ${DB_USER:bikeshop_user}
    password: ${DB_PASS:bikeshop_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: 8080
  servlet:
    context-path: /api/v1
jwt:
  secret: ${JWT_SECRET:cambiaEstaClaveEnProduccionPorUnaMuyLargaDe32CharsMin}
  expiration: 86400000
logging:
  level:
    org.springframework.security: DEBUG
    com.bikeshop.manager: DEBUG
