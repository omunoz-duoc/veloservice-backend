spring:
  application:
    name: veloservice-backend
  profiles:
    active: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    schemas: public
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: false
server:
  port: 8080
  servlet:
    context-path: /api/v1
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
security:
  login:
    max-attempts: 5
    window-minutes: 10
    lock-minutes: 15
  reset-expiration: 900000
app:
  reset-password-url: ${RESET_PASSWORD_URL:http://localhost:3000/reset-password}
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:}
  base-url: https://api.resend.com
logging:
  level:
    org.springframework.security: DEBUG
    com.bikeshop.manager: DEBUG
