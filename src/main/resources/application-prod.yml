spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    schemas: public
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: false
app:
  media:
    storage-root: ${MEDIA_STORAGE_ROOT:/tmp/veloservice-media}
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:https://media.veloservice.cl}
cloudflare:
  r2:
    account-id: ${CF_R2_ACCOUNT_ID}
    access-key-id: ${CF_R2_ACCESS_KEY_ID}
    secret-access-key: ${CF_R2_SECRET_ACCESS_KEY}
    bucket-name: ${CF_R2_BUCKET_NAME}
    public-base-url: ${CF_R2_PUBLIC_BASE_URL}
    presign-expiry: 15m
