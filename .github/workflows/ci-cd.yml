name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests (dev/H2 profile)
        run: mvn test -B -Dspring.profiles.active=dev

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── 2. Build & Push ───────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    permissions:
      contents: read

    outputs:
      full-image: ${{ steps.image-name.outputs.full-image }}

    steps:
      - uses: actions/checkout@v4

      - name: Build image name
        id: image-name
        env:
          REGION: ${{ vars.GCP_REGION }}
          PROJECT: ${{ vars.GCP_PROJECT_ID }}
          REPO: ${{ vars.GAR_REPOSITORY }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/veloservice-backend"
          echo "full-image=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image-base=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-name.outputs.full-image }}
            ${{ steps.image-name.outputs.image-base }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Cloud Run ────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ needs.build-and-push.outputs.full-image }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod
            DB_HOST=${{ vars.DB_HOST }}
            DB_PORT=${{ vars.DB_PORT }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM=${{ secrets.RESEND_FROM }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3

      - name: Print service URL
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: echo "Deployed to $SERVICE_URL"
